<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monthly Finance Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; }
    h1 { text-align: center; }
    form { max-width: 600px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 8px; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 5px; }
    button { margin-top: 15px; padding: 10px 20px; }
    table { border-collapse: collapse; margin: 20px auto; width: 95%; background: #fff; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #eee; }
    tfoot td { font-weight: bold; background: #f0f0f0; }
    #clearBtn { display: block; margin: 20px auto; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: crimson; color: #fff; }
    .deleteBtn { background: darkred; color: #fff; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Monthly Finance Tracker</h1>

  <!-- Login Screen -->
  <form id="loginForm">
    <label>Username: <input type="text" id="username" required></label>
    <label>Password: <input type="password" id="password" required></label>
    <button type="submit">Login</button>
  </form>

  <!-- Data Entry Form -->
  <form id="financeForm" style="display:none;">
    <label>Month: <input type="text" id="month" required></label>
    <label>Income: <input type="number" id="income" required></label>
    <label>Expenses: <input type="number" id="expenses" required></label>
    <label>Investments: <input type="number" id="investments" required></label>
    <button type="submit">Add Data</button>
  </form>

  <!-- Summary Table -->
  <table id="summaryTable" style="display:none;">
    <thead>
      <tr>
        <th>Month</th>
        <th>Income (₹)</th>
        <th>Expenses (₹)</th>
        <th>Investments (₹)</th>
        <th>Net Balance (₹)</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
    <tfoot>
      <tr>
        <td>Totals</td>
        <td id="totalIncome">0</td>
        <td id="totalExpenses">0</td>
        <td id="totalInvestments">0</td>
        <td id="totalNetBalance">0</td>
        <td></td>
      </tr>
    </tfoot>
  </table>

  <!-- Clear Data Button -->
  <button id="clearBtn" style="display:none;">Clear All Data</button>

  <script>
    const summaryTableBody = document.querySelector('#summaryTable tbody');
    const totalIncomeCell = document.getElementById('totalIncome');
    const totalExpensesCell = document.getElementById('totalExpenses');
    const totalInvestmentsCell = document.getElementById('totalInvestments');
    const totalNetBalanceCell = document.getElementById('totalNetBalance');

    let totalIncome = 0, totalExpenses = 0, totalInvestments = 0, totalNetBalance = 0;

    // Login logic
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      if(user && pass) {
        alert("Login successful!");
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('financeForm').style.display = 'block';
        document.getElementById('summaryTable').style.display = 'table';
        document.getElementById('clearBtn').style.display = 'block';
        loadData();
      } else {
        alert("Enter valid credentials");
      }
    });

    // Load saved data
    function loadData() {
      summaryTableBody.innerHTML = '';
      totalIncome = 0;
      totalExpenses = 0;
      totalInvestments = 0;
      totalNetBalance = 0;

      const savedData = JSON.parse(localStorage.getItem('financeData')) || [];
      savedData.forEach(entry => addEntry(entry.month, entry.income, entry.expenses, entry.investments, false));
    }

    document.getElementById('financeForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const month = document.getElementById('month').value;
      const income = parseFloat(document.getElementById('income').value);
      const expenses = parseFloat(document.getElementById('expenses').value);
      const investments = parseFloat(document.getElementById('investments').value);

      addEntry(month, income, expenses, investments, true);
      this.reset();
    });

    function addEntry(month, income, expenses, investments, save=true) {
      const netBalance = income - expenses - investments;

      // Update table
      const row = document.createElement('tr');
      row.innerHTML = `<td>${month}</td><td>${income}</td><td>${expenses}</td><td>${investments}</td><td>${netBalance}</td>
                       <td><button class="deleteBtn">Delete</button></td>`;
      summaryTableBody.appendChild(row);

      // Delete row handler
      row.querySelector('.deleteBtn').addEventListener('click', () => {
        summaryTableBody.removeChild(row);
        totalIncome -= income;
        totalExpenses -= expenses;
        totalInvestments -= investments;
        totalNetBalance -= netBalance;
        totalIncomeCell.textContent = totalIncome;
        totalExpensesCell.textContent = totalExpenses;
        totalInvestmentsCell.textContent = totalInvestments;
        totalNetBalanceCell.textContent = totalNetBalance;

        let savedData = JSON.parse(localStorage.getItem('financeData')) || [];
        savedData = savedData.filter(d => !(d.month === month && d.income === income && d.expenses === expenses && d.investments === investments));
        localStorage.setItem('financeData', JSON.stringify(savedData));
      });

      // Update totals
      totalIncome += income;
      totalExpenses += expenses;
      totalInvestments += investments;
      totalNetBalance += netBalance;
      totalIncomeCell.textContent = totalIncome;
      totalExpensesCell.textContent = totalExpenses;
      totalInvestmentsCell.textContent = totalInvestments;
      totalNetBalanceCell.textContent = totalNetBalance;

      // Save to LocalStorage
      if(save) {
        const savedData = JSON.parse(localStorage.getItem('financeData')) || [];
        savedData.push({ month, income, expenses, investments });
        localStorage.setItem('financeData', JSON.stringify(savedData));
      }
    }

    // Clear all data
    document.getElementById('clearBtn').addEventListener('click', function() {
      localStorage.removeItem('financeData');
      summaryTableBody.innerHTML = '';
      totalIncome = 0;
      totalExpenses = 0;
      totalInvestments = 0;
      totalNetBalance = 0;
      totalIncomeCell.textContent = 0;
      totalExpensesCell.textContent = 0;
      totalInvestmentsCell.textContent = 0;
      totalNetBalanceCell.textContent = 0;
    });
  </script>
</body>
</html>
