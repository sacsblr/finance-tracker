<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monthly Finance Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; }
    h2 { text-align: center; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 5px; }
    button { margin-top: 15px; padding: 10px; background: #0078d7; color: white; border: none; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #eee; }
    .summary-box { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: #f9f9f9; }
    .delete-btn { background: #d9534f; color: white; border: none; padding: 8px 12px; cursor: pointer; margin-top: 10px; }
    #trackerSection { display: none; }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginSection">
    <h2>Login</h2>
    <label>Username:</label>
    <input type="text" id="loginUser" required>
    <label>Password:</label>
    <input type="password" id="loginPass" required>
    <button onclick="login()">Login</button>
    <p id="loginMessage" style="color:red;"></p>
  </div>

  <!-- Tracker -->
  <div id="trackerSection">
    <h2>Monthly Finance Tracker</h2>
    <form id="financeForm">
      <label>Month:</label>
      <input type="text" id="month" placeholder="e.g. May 2026" required>
      <label>Rental Income:</label>
      <input type="number" id="rental" required>
      <label>Investments:</label>
      <input type="number" id="investments" required>
      <label>Bill Payments:</label>
      <input type="number" id="bills" required>
      <button type="submit">Save Monthly Data</button>
    </form>

    <button class="delete-btn" onclick="deleteSelectedRows()">Delete Selected Rows</button>

    <table id="historyTable">
      <thead>
        <tr>
          <th>Select</th>
          <th>Month</th>
          <th>Income (₹)</th>
          <th>Expenses (₹)</th>
          <th>Investments (₹)</th>
          <th>Net Balance (₹)</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="overallSummary" class="summary-box">
      <h3>Overall Summary</h3>
      <p id="totalIncome"></p>
      <p id="totalExpenses"></p>
      <p id="totalInvestments"></p>
      <p id="totalNet"></p>
    </div>
  </div>

  <!-- Firebase compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <script>
    // 🔑 Replace with your actual Firebase config from console
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "finance-tracker-sa.firebaseapp.com",
      projectId: "finance-tracker-sa",
      storageBucket: "finance-tracker-sa.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase (compat style)
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Hard-coded admin login
    const adminUser = "sacsblr";
    const adminPass = "admin";

    function login() {
      const user = document.getElementById("loginUser").value.trim();
      const pass = document.getElementById("loginPass").value.trim();
      if (user === adminUser && pass === adminPass) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("trackerSection").style.display = "block";
        loadData();
      } else {
        document.getElementById("loginMessage").textContent = "Invalid username or password.";
      }
    }

    const form = document.getElementById("financeForm");
    const historyTableBody = document.querySelector("#historyTable tbody");
    const totalIncomeEl = document.getElementById("totalIncome");
    const totalExpensesEl = document.getElementById("totalExpenses");
    const totalInvestmentsEl = document.getElementById("totalInvestments");
    const totalNetEl = document.getElementById("totalNet");

    let historyData = [];

    async function loadData() {
      const snapshot = await db.collection("financeHistory").get();
      historyData = snapshot.docs.map(doc => doc.data());
      renderTable();
    }

    function renderTable() {
      historyTableBody.innerHTML = "";
      let sumIncome = 0, sumExpenses = 0, sumInvestments = 0, sumNet = 0;

      historyData.forEach((entry, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><input type="checkbox" class="rowCheckbox" data-index="${index}"></td>
          <td>${entry.month}</td>
          <td>${entry.income}</td>
          <td>${entry.expenses}</td>
          <td>${entry.investments}</td>
          <td>${entry.netBalance}</td>
        `;
        historyTableBody.appendChild(row);

        sumIncome += entry.income;
        sumExpenses += entry.expenses;
        sumInvestments += entry.investments;
        sumNet += entry.netBalance;
      });

      totalIncomeEl.textContent = historyData.length ? "Total Income: ₹" + sumIncome : "Total Income: No data yet";
      totalExpensesEl.textContent = historyData.length ? "Total Expenses: ₹" + sumExpenses : "Total Expenses: No data yet";
      totalInvestmentsEl.textContent = historyData.length ? "Total Investments: ₹" + sumInvestments : "Total Investments: No data yet";
      totalNetEl.textContent = historyData.length ? "Cumulative Net Balance: ₹" + sumNet : "Cumulative Net Balance: No data yet";
    }

    async function deleteSelectedRows() {
      const checkboxes = document.querySelectorAll(".rowCheckbox:checked");
      if (checkboxes.length === 0) {
        alert("Please select at least one row to delete.");
        return;
      }
      const indicesToDelete = Array.from(checkboxes).map(cb => parseInt(cb.dataset.index));
      indicesToDelete.sort((a, b) => b - a).forEach(async idx => {
        const month = historyData[idx].month;
        await db.collection("financeHistory").doc(month).delete();
        historyData.splice(idx, 1);
      });
      renderTable();
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const month = document.getElementById("month").value.trim();
      const rental = parseFloat(document.getElementById("rental").value) || 0;
      const investments = parseFloat(document.getElementById("investments").value) || 0;
      const bills = parseFloat(document.getElementById("bills").value) || 0;

      const income = rental;
      const expenses = bills;
      const totalInvestments = investments;
      const netBalance = income - (expenses + totalInvestments);

      const entry = { month, income, expenses, investments: totalInvestments, netBalance };

      await db.collection("financeHistory").doc(month).set(entry);
      await loadData();
      form.reset();
    });
  </script>
</body>
</html>
